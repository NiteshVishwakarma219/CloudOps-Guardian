apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudops-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudops
  template:
    metadata:
      labels:
        app: cloudops
    spec:
      containers:
      - name: backend
        image: cloudops-backend:latest
        ports:
        - containerPort: 8000